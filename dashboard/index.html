<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Allocation Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-blob blob-a"></div>
    <div class="bg-blob blob-b"></div>

    <main class="page">
      <header>
        <h1>Teacher Allocation Optimizer</h1>
        <p>Greedy baseline vs SPFA-based Min-Cost Max-Flow</p>
      </header>

      <section class="controls card">
        <label for="algorithmSelect">Algorithm</label>
        <select id="algorithmSelect">
          <option value="mcmf">Min-Cost Max-Flow</option>
          <option value="greedy">Greedy Baseline</option>
        </select>
        <span id="statusText">Loading...</span>
      </section>

      <section class="kpi-grid">
        <article class="card kpi">
          <h2>Coverage</h2>
          <p id="coverageValue">-</p>
        </article>
        <article class="card kpi">
          <h2>Total Travel</h2>
          <p id="travelValue">-</p>
        </article>
        <article class="card kpi">
          <h2>Workload Std</h2>
          <p id="fairnessValue">-</p>
        </article>
      </section>

      <section class="card chart-wrap">
        <h2>KPI Comparison</h2>
        <canvas id="kpiChart"></canvas>
      </section>

      <section class="card">
        <h2>Map</h2>
        <div id="map"></div>
      </section>

      <section class="panel-grid">
        <article class="card">
          <h2>Allocations</h2>
          <div class="table-scroll">
            <table id="allocTable">
              <thead>
                <tr>
                  <th>Teacher</th>
                  <th>School</th>
                  <th>Subject</th>
                  <th>Hours</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </article>

        <article class="card">
          <h2>Unmet Demand</h2>
          <ul id="unmetList"></ul>
        </article>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
